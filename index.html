<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors — First to 5</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game">
      <h1>Rock Paper Scissors</h1>
      <p class="subtitle">First to 5 points wins.</p>

      <div class="scoreboard">
        <div class="score-card">
          <div class="label">You</div>
          <div class="value" id="humanScore">0</div>
        </div>
        <div class="score-card">
          <div class="label">Computer</div>
          <div class="value" id="computerScore">0</div>
        </div>
      </div>

      <!-- Live round feedback lives here during play -->
      <div class="result" id="result" role="status" aria-live="polite">
        Pick a move to start.
      </div>

      <!-- Play screen -->
      <div class="choices" id="choices">
        <button class="choice" data-choice="rock">
          <span class="emoji">🪨</span>Rock
        </button>
        <button class="choice" data-choice="paper">
          <span class="emoji">📄</span>Paper
        </button>
        <button class="choice" data-choice="scissors">
          <span class="emoji">✂️</span>Scissors
        </button>
      </div>

      <!-- End screen (hidden until someone reaches 5) -->
      <div class="final hidden" id="final">
        <div class="headline" id="finalHeadline"></div>
        <div class="sub" id="finalSub"></div>
        <button class="reset" id="resetBtn">Play again</button>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
